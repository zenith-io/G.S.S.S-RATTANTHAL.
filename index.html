<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GSSS Ratthanthal | Admissions Open 2026-27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --gold3: #f5e0a0;
    --dark: #050810;
    --dark2: #080d1a;
    --dark3: #0d1428;
    --dark4: #111c35;
    --neon-blue: #00d4ff;
    --neon-cyan: #00ffcc;
    --neon-purple: #b400ff;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(201,168,76,0.2);
    --text-primary: #f0e8d0;
    --text-secondary: #b8a87a;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  html { scroll-behavior: smooth; font-size: 16px; }

  body {
    background: var(--dark);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  .cursor {
    position: fixed; top:0; left:0; width:12px; height:12px;
    background: var(--gold); border-radius:50%;
    pointer-events:none; z-index:99999;
    transform: translate(-50%,-50%);
    transition: transform 0.1s, width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: difference;
  }
  .cursor-follower {
    position:fixed; top:0; left:0; width:40px; height:40px;
    border:1px solid rgba(201,168,76,0.5); border-radius:50%;
    pointer-events:none; z-index:99998;
    transform:translate(-50%,-50%);
    transition: transform 0.15s ease, width 0.3s, height 0.3s;
  }
  body:hover .cursor { transform:translate(-50%,-50%) scale(1); }

  /* SCROLL PROGRESS */
  #scroll-progress {
    position:fixed; top:0; left:0; height:3px;
    background: linear-gradient(90deg, var(--gold), var(--neon-cyan), var(--gold2));
    z-index:10000; width:0%; transition:width 0.1s;
    box-shadow: 0 0 10px var(--gold);
  }

  /* LOADING SCREEN */
  #loader {
    position:fixed; inset:0; background:var(--dark);
    z-index:99997; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    transition: opacity 0.8s, visibility 0.8s;
  }
  #loader.hidden { opacity:0; visibility:hidden; }
  .loader-logo {
    font-family:'Cinzel Decorative', serif;
    font-size:clamp(1.5rem,4vw,3rem);
    color:var(--gold);
    text-align:center;
    letter-spacing:0.15em;
    margin-bottom:2rem;
    animation: pulseGlow 1.5s ease-in-out infinite;
  }
  .loader-bar-wrap {
    width:280px; height:2px;
    background:rgba(201,168,76,0.15);
    border-radius:2px; overflow:hidden;
  }
  .loader-bar {
    height:100%; width:0%;
    background:linear-gradient(90deg,var(--gold),var(--gold3));
    border-radius:2px;
    box-shadow: 0 0 12px var(--gold);
    animation: loadBar 2.5s ease-in-out forwards;
  }
  .loader-percent {
    font-family:'Orbitron',sans-serif;
    font-size:0.85rem; color:var(--gold2);
    margin-top:1rem; letter-spacing:0.2em;
  }
  .loader-particles { position:absolute; inset:0; overflow:hidden; }
  @keyframes loadBar { 0%{width:0%} 100%{width:100%} }
  @keyframes pulseGlow {
    0%,100%{ text-shadow: 0 0 20px rgba(201,168,76,0.5); }
    50%{ text-shadow: 0 0 40px var(--gold), 0 0 80px rgba(201,168,76,0.3); }
  }

  /* NAVBAR */
  nav {
    position:fixed; top:36px; left:0; right:0; z-index:1000;
    padding:1rem 4%;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(5,8,16,0.7);
    backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(201,168,76,0.1);
    transition:all 0.4s;
  }
  nav.scrolled {
    padding:0.6rem 4%;
    background:rgba(5,8,16,0.95);
    border-bottom-color:rgba(201,168,76,0.25);
    box-shadow:0 8px 40px rgba(0,0,0,0.6);
  }
  .nav-logo {
    display:flex; align-items:center; gap:0.8rem; text-decoration:none;
  }
  .nav-logo-icon {
    width:44px; height:44px;
    background:linear-gradient(135deg,var(--gold),var(--dark3));
    border-radius:8px; display:flex; align-items:center; justify-content:center;
    font-size:1.4rem; border:1px solid rgba(201,168,76,0.4);
    box-shadow:0 0 20px rgba(201,168,76,0.2);
  }
  .nav-logo-text { line-height:1.1; }
  .nav-logo-text span:first-child {
    display:block; font-family:'Cinzel Decorative',serif;
    font-size:0.95rem; color:var(--gold); letter-spacing:0.08em;
  }
  .nav-logo-text span:last-child {
    display:block; font-size:0.65rem; color:var(--text-secondary);
    letter-spacing:0.15em; text-transform:uppercase;
  }
  .nav-links {
    display:flex; gap:0.3rem; list-style:none;
  }
  .nav-links a {
    display:block; padding:0.5rem 1rem;
    color:var(--text-secondary); text-decoration:none;
    font-size:0.85rem; letter-spacing:0.12em; text-transform:uppercase;
    font-weight:600; transition:color 0.3s;
    position:relative;
  }
  .nav-links a::after {
    content:''; position:absolute; bottom:0; left:50%; right:50%;
    height:1px; background:var(--gold);
    transition:left 0.3s, right 0.3s;
  }
  .nav-links a:hover { color:var(--gold); }
  .nav-links a:hover::after { left:1rem; right:1rem; }
  .nav-cta {
    padding:0.6rem 1.5rem;
    background:linear-gradient(135deg,var(--gold),#9a7230);
    color:#000; font-size:0.8rem; letter-spacing:0.12em;
    text-transform:uppercase; font-weight:700; border-radius:4px;
    border:none; cursor:none; text-decoration:none;
    transition:all 0.3s;
    box-shadow:0 0 20px rgba(201,168,76,0.3);
  }
  .nav-cta:hover {
    box-shadow:0 0 40px rgba(201,168,76,0.6);
    transform:translateY(-1px);
  }
  .hamburger { display:none; flex-direction:column; gap:5px; cursor:none; }
  .hamburger span { width:24px; height:2px; background:var(--gold); display:block; transition:all 0.3s; }

  /* HERO */
  #hero {
    min-height:100vh; position:relative;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; padding-top:80px;
  }
  
   100%{transform:scale(1.08)}
  }
  .hero-overlay {
    position:absolute; inset:0;
    background:linear-gradient(135deg,
      rgba(5,8,16,0.92) 0%,
      rgba(8,13,26,0.75) 40%,
      rgba(5,8,16,0.85) 100%);
  }
  .hero-overlay-grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
    background-size:60px 60px;
    animation:gridMove 20s linear infinite;
  }
  @keyframes gridMove {
    0%{background-position:0 0} 100%{background-position:60px 60px}
  }
  .hero-content {
    position:relative; z-index:5; text-align:center;
    padding:2rem; max-width:900px;
  }
  .hero-badge {
    display:inline-flex; align-items:center; gap:0.6rem;
    background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.3);
    padding:0.4rem 1.2rem; border-radius:50px;
    font-size:0.75rem; letter-spacing:0.2em; text-transform:uppercase;
    color:var(--gold2); margin-bottom:1.5rem;
    backdrop-filter:blur(10px);
    animation:fadeInDown 0.8s ease 0.3s both;
  }
  .hero-badge::before {
    content:''; width:6px; height:6px;
    background:var(--neon-cyan); border-radius:50%;
    box-shadow:0 0 8px var(--neon-cyan);
    animation:blink 1.5s ease infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .hero-title {
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(2rem,6vw,5rem);
    line-height:1.1; margin-bottom:1rem;
    animation:fadeInUp 0.9s ease 0.5s both;
  }
  .hero-title .line1 { display:block; color:var(--text-primary); }
  .hero-title .line2 {
    display:block;
    background:linear-gradient(135deg,var(--gold),var(--gold3),var(--gold));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text;
    text-shadow:none;
  }
  .hero-subtitle {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(1rem,2.5vw,1.5rem);
    color:var(--text-secondary); font-style:italic;
    margin-bottom:2.5rem; line-height:1.6;
    animation:fadeInUp 0.9s ease 0.7s both;
  }
  .hero-quote {
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(0.9rem,1.8vw,1.15rem);
    color:rgba(201,168,76,0.7); font-style:italic;
    margin-bottom:3rem; letter-spacing:0.05em;
    animation:fadeInUp 0.9s ease 0.9s both;
  }
  .hero-quote::before { content:'"'; font-size:2em; line-height:0; vertical-align:-0.4em; margin-right:0.1em; color:var(--gold); }
  .hero-quote::after { content:'"'; font-size:2em; line-height:0; vertical-align:-0.4em; margin-left:0.1em; color:var(--gold); }
  .hero-btns {
    display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;
    animation:fadeInUp 0.9s ease 1.1s both;
  }
  .btn-primary {
    padding:0.9rem 2.5rem;
    background:linear-gradient(135deg,var(--gold),#9a7230);
    color:#000; font-weight:700; font-size:0.9rem;
    letter-spacing:0.15em; text-transform:uppercase;
    border-radius:4px; border:none; cursor:none;
    text-decoration:none; display:inline-flex; align-items:center; gap:0.6rem;
    transition:all 0.3s;
    box-shadow:0 8px 30px rgba(201,168,76,0.4);
    position:relative; overflow:hidden;
  }
  .btn-primary::before {
    content:''; position:absolute; inset:-2px;
    background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold3));
    border-radius:4px; z-index:-1; opacity:0;
    transition:opacity 0.3s;
  }
  .btn-primary:hover { transform:translateY(-3px); box-shadow:0 12px 50px rgba(201,168,76,0.6); }
  .btn-primary:hover::before { opacity:1; }
  .btn-secondary {
    padding:0.9rem 2.5rem;
    background:rgba(201,168,76,0.05);
    color:var(--gold); font-weight:700; font-size:0.9rem;
    letter-spacing:0.15em; text-transform:uppercase;
    border-radius:4px; border:1px solid rgba(201,168,76,0.3);
    cursor:none; text-decoration:none;
    display:inline-flex; align-items:center; gap:0.6rem;
    backdrop-filter:blur(10px);
    transition:all 0.3s;
  }
  .btn-secondary:hover {
    background:rgba(201,168,76,0.12);
    border-color:var(--gold);
    box-shadow:0 0 30px rgba(201,168,76,0.2);
    transform:translateY(-3px);
  }
  .hero-stats {
    position:absolute; bottom:3rem; left:50%; transform:translateX(-50%);
    display:flex; gap:3rem; z-index:5;
    animation:fadeInUp 0.9s ease 1.3s both;
  }
  .hero-stat { text-align:center; }
  .hero-stat-num {
    font-family:'Orbitron',sans-serif;
    font-size:1.8rem; font-weight:700;
    background:linear-gradient(135deg,var(--gold),var(--gold3));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .hero-stat-label {
    font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase;
    color:var(--text-secondary); margin-top:0.2rem;
  }
  .hero-scroll-hint {
    position:absolute; bottom:1.5rem; right:4%;
    display:flex; flex-direction:column; align-items:center; gap:0.4rem;
    color:var(--text-secondary); font-size:0.65rem; letter-spacing:0.2em;
    text-transform:uppercase; z-index:5;
    animation:fadeIn 1s ease 2s both;
  }
  .scroll-line {
    width:1px; height:50px;
    background:linear-gradient(to bottom, var(--gold), transparent);
    animation:scrollLine 1.5s ease infinite;
  }
  @keyframes scrollLine {
    0%{opacity:0;transform:scaleY(0);transform-origin:top} 50%{opacity:1} 100%{opacity:0;transform:scaleY(1)}
  }

  /* FLOATING ELEMENTS */
  .float-el {
    position:absolute; pointer-events:none;
    animation:floatEl 6s ease-in-out infinite;
  }
  .float-el:nth-child(1){top:15%;right:8%;animation-delay:0s;}
  .float-el:nth-child(2){top:40%;right:5%;animation-delay:1.5s;}
  .float-el:nth-child(3){top:65%;left:6%;animation-delay:3s;}
  .float-el:nth-child(4){top:25%;left:5%;animation-delay:4.5s;}
  @keyframes floatEl {
    0%,100%{transform:translateY(0) rotate(0deg)}
    50%{transform:translateY(-20px) rotate(5deg)}
  }
  .float-card {
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(201,168,76,0.2);
    border-radius:12px; padding:1rem 1.5rem;
    backdrop-filter:blur(15px);
    text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .float-card-icon { font-size:1.8rem; margin-bottom:0.3rem; }
  .float-card-text { font-size:0.7rem; letter-spacing:0.1em; color:var(--gold2); text-transform:uppercase; }

  /* PARTICLES */
  #particles-canvas {
    position:absolute; inset:0; pointer-events:none; z-index:1;
  }

  /* SECTIONS */
  section { padding:6rem 5%; }
  .section-tag {
    display:inline-flex; align-items:center; gap:0.5rem;
    font-size:0.7rem; letter-spacing:0.25em; text-transform:uppercase;
    color:var(--gold); margin-bottom:0.8rem;
    font-family:'Orbitron',sans-serif;
  }
  .section-tag::before {
    content:''; width:30px; height:1px; background:var(--gold);
    box-shadow:0 0 8px var(--gold);
  }
  .section-title {
    font-family:'Cinzel Decorative',serif;
    font-size:clamp(1.8rem,4vw,3rem);
    line-height:1.15; margin-bottom:1rem;
  }
  .section-title .accent {
    background:linear-gradient(135deg,var(--gold),var(--gold3));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .section-desc {
    font-family:'Cormorant Garamond',serif;
    font-size:1.15rem; color:var(--text-secondary);
    max-width:650px; line-height:1.8;
  }
  .section-header { margin-bottom:4rem; }
  .section-header.center { text-align:center; }
  .section-header.center .section-tag { justify-content:center; }
  .section-header.center .section-desc { margin:0 auto; }
  .divider {
    width:80px; height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    margin:1.5rem 0;
  }
  .divider.center { margin:1.5rem auto; }

  /* ABOUT */
  #about { background:var(--dark2); position:relative; overflow:hidden; }
  #about::before {
    content:''; position:absolute; top:-200px; right:-200px;
    width:600px; height:600px;
    background:radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
    pointer-events:none;
  }
  .about-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:4rem; align-items:center;
  }
  .about-img-wrap {
    position:relative;
  }
  .about-img {
    width:100%; border-radius:12px;
    aspect-ratio:4/3; object-fit:cover;
    display:block;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .about-img-overlay {
    position:absolute; inset:0; border-radius:12px;
    background:linear-gradient(135deg, rgba(201,168,76,0.15), transparent);
    pointer-events:none;
  }
  .about-img-border {
    position:absolute; inset:-2px; border-radius:14px;
    background:linear-gradient(135deg,var(--gold),transparent,var(--gold));
    z-index:-1; opacity:0.4;
  }
  .about-img-badge {
    position:absolute; bottom:-1.5rem; right:-1.5rem;
    background:linear-gradient(135deg,var(--gold),#9a7230);
    color:#000; padding:1.2rem 1.8rem;
    border-radius:10px; text-align:center;
    box-shadow:0 8px 30px rgba(201,168,76,0.4);
  }
  .about-img-badge .num {
    display:block; font-family:'Orbitron',sans-serif;
    font-size:2rem; font-weight:700; line-height:1;
  }
  .about-img-badge .lbl {
    font-size:0.7rem; letter-spacing:0.15em; text-transform:uppercase; font-weight:700;
  }
  .about-cards {
    display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-top:2rem;
  }
  .about-card {
    background:var(--glass); border:1px solid var(--glass-border);
    border-radius:10px; padding:1.5rem;
    backdrop-filter:blur(10px);
    transition:all 0.3s;
    position:relative; overflow:hidden;
  }
  .about-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    opacity:0; transition:opacity 0.3s;
  }
  .about-card:hover { border-color:rgba(201,168,76,0.4); transform:translateY(-3px); }
  .about-card:hover::before { opacity:1; }
  .about-card-icon { font-size:1.8rem; margin-bottom:0.8rem; }
  .about-card-title {
    font-family:'Orbitron',sans-serif; font-size:0.75rem;
    letter-spacing:0.15em; color:var(--gold); text-transform:uppercase;
    margin-bottom:0.5rem;
  }
  .about-card-desc { font-size:0.9rem; color:var(--text-secondary); line-height:1.6; }

  /* STREAMS */
  #streams { position:relative; overflow:hidden; }
  #streams::before {
    content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:800px; height:800px;
    background:radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
    pointer-events:none;
  }
  .streams-grid {
    display:grid; grid-template-columns:repeat(3,1fr); gap:2rem;
  }
  .stream-card {
    background:var(--glass); border:1px solid var(--glass-border);
    border-radius:16px; overflow:hidden;
    transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
    position:relative;
    transform-style:preserve-3d;
  }
  .stream-card:hover {
    transform:translateY(-10px);
    border-color:rgba(201,168,76,0.5);
    box-shadow:0 30px 60px rgba(0,0,0,0.5), 0 0 40px rgba(201,168,76,0.15);
  }
  .stream-img {
    width:100%; height:220px; object-fit:cover;
    transition:transform 0.6s ease;
    display:block;
  }
  .stream-card:hover .stream-img { transform:scale(1.08); }
  .stream-img-overlay {
    position:absolute; top:0; left:0; right:0; height:220px;
    background:linear-gradient(to bottom, transparent 40%, rgba(5,8,16,0.9) 100%);
  }
  .stream-badge {
    position:absolute; top:1rem; left:1rem;
    background:linear-gradient(135deg,var(--gold),#9a7230);
    color:#000; padding:0.3rem 0.8rem;
    border-radius:50px; font-size:0.65rem;
    font-weight:700; letter-spacing:0.15em; text-transform:uppercase;
  }
  .stream-body { padding:1.5rem; }
  .stream-icon { font-size:2.5rem; margin-bottom:0.8rem; }
  .stream-title {
    font-family:'Cinzel Decorative',serif;
    font-size:1.1rem; color:var(--gold2); margin-bottom:0.5rem;
  }
  .stream-desc { font-size:0.9rem; color:var(--text-secondary); margin-bottom:1.2rem; line-height:1.6; }
  .stream-subjects { display:flex; flex-direction:column; gap:0.4rem; }
  .stream-subject {
    display:flex; align-items:center; gap:0.6rem;
    font-size:0.85rem; color:var(--text-primary); padding:0.4rem 0;
    border-bottom:1px solid rgba(201,168,76,0.08);
  }
  .stream-subject:last-child { border-bottom:none; }
  .stream-subject::before {
    content:''; width:6px; height:6px; border-radius:50%;
    background:var(--gold); flex-shrink:0;
    box-shadow:0 0 6px var(--gold);
  }

  /* STAFF */
  #staff { background:var(--dark2); }
  .staff-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:2rem;
  }
  .staff-card {
    background:var(--glass); border:1px solid var(--glass-border);
    border-radius:16px; overflow:hidden; text-align:center;
    transition:all 0.4s;
    position:relative;
  }
  .staff-card::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg, rgba(201,168,76,0.05), transparent);
    opacity:0; transition:opacity 0.3s; pointer-events:none;
    border-radius:16px;
  }
  .staff-card:hover { transform:translateY(-8px); border-color:rgba(201,168,76,0.4); box-shadow:0 20px 50px rgba(0,0,0,0.4); }
  .staff-card:hover::after { opacity:1; }
  .staff-img-wrap { position:relative; overflow:hidden; }
  .staff-img {
    width:100%; height:240px; object-fit:cover;
    transition:transform 0.5s ease; display:block;
  }
